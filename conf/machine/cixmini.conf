#@TYPE: Machine
#@NAME: cixmini
#@DESCRIPTION: Cix Sky1 / CP8180 machine config for Minisforum MS-R1.

require conf/machine/include/arm/arch-armv8a.inc

DEFAULTTUNE = "armv8a-crc"

MACHINEOVERRIDES =. "cix-sky1:cp8180:ms-r1:"
SOC_FAMILY = "cix-sky1:cp8180"

MACHINE_FEATURES = "acpi alsa bluetooth efi keyboard pci rtc screen usbhost vfat wifi"

KERNEL_IMAGETYPE = "Image"
PREFERRED_PROVIDER_virtual/kernel ?= "linux-cix-msr1"
PREFERRED_VERSION_linux-cix-msr1 ?= "6.6.10%"

# Sky1 boards boot through UEFI/ACPI. The Cix mainline notes require this
# kernel parameter until clock handling is fully upstreamed.
APPEND += "console=tty0 console=ttyAMA0,115200 earlycon clk_ignore_unused"

SERIAL_CONSOLES ?= "115200;ttyAMA0 115200;ttyS0"

MACHINE_EXTRA_RRECOMMENDS += " \
    kernel-modules \
    cix-sky1-firmware \
"

IMAGE_FSTYPES ?= "wic.gz wic.bmap"
WKS_FILE ?= "cixmini.wks.in"

EFI_PROVIDER ?= "${@bb.utils.contains('DISTRO_FEATURES', 'systemd', 'systemd-boot', 'grub-efi', d)}"

# bootimg-efi (used by wic/cixmini.wks.in) bundles an initramfs cpio.gz
# alongside the kernel + EFI loader. core-image-minimal-initramfs
# provides that cpio. INITRAMFS_IMAGE_BUNDLE=0 keeps it as a separate
# artifact instead of embedded in the kernel image.
INITRAMFS_IMAGE = "core-image-minimal-initramfs"
INITRAMFS_IMAGE_BUNDLE = "0"
