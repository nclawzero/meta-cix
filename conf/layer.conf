# meta-cix -- Yocto BSP layer for nclawzero on Cix Sky1 / Minisforum MS-R1.

BBPATH .= ":${LAYERDIR}"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
"

# wic image-recipe templates ship under wic/ and are picked up via
# WKS_SEARCH_PATH. The cixmini.wks.in here is selected by
# conf/machine/cixmini.conf WKS_FILE.
WKS_SEARCH_PATH .= ":${LAYERDIR}/wic"

BBFILE_COLLECTIONS += "cix"
BBFILE_PATTERN_cix = "^${LAYERDIR}/"
BBFILE_PRIORITY_cix = "10"

LAYERDEPENDS_cix = "core"

LAYERSERIES_COMPAT_cix = "scarthgap"
