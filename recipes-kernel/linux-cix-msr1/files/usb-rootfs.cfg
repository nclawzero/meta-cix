#
# Force USB host + storage + UAS into the kernel image so the cixmini
# can boot from a USB-attached rootfs without modules in initramfs.
#
# Cix's stock cix.config has these as =m; that's fine when the rootfs
# lives on PCIe NVMe (which loads built-in) but hangs forever when
# rootfs is on USB and core-image-minimal-initramfs ships zero modules.
# Boot symptom: kernel finishes PCIe enumeration, then `rootwait` waits
# indefinitely because /dev/sdX2 never appears (no usb_storage driver
# bound to the xhci-attached USB device).
#
# This fragment is applied AFTER cix.config in do_configure:prepend.
# olddefconfig resolves any dependencies these flips imply.

# USB_XHCI_PCI's Kconfig has `depends on USB_XHCI_PCI_RENESAS ||
# !USB_XHCI_PCI_RENESAS`. cix.config has RENESAS=m, which Kconfig
# tristate dep arithmetic uses to CAP USB_XHCI_PCI at =m no matter
# what we override below. First-run override hit exactly this trap
# (kernel still couldn't bind xhci-pci on MS-R1). Setting RENESAS=y
# unlocks XHCI_PCI=y; the Renesas driver compiles fine even without
# Renesas hardware, just doesn't bind to anything.
CONFIG_USB_XHCI_PCI_RENESAS=y
CONFIG_USB_XHCI_PCI=y
CONFIG_USB_STORAGE=y
CONFIG_USB_UAS=y

# USB HID for emergency keyboard at console — fleet rule
# (feedback_console_always_on.md): every image must have USB-keyboard
# working from kernel handoff through login. Also =m in stock cix.config.
CONFIG_USB_HID=y
CONFIG_HID_GENERIC=y

# VFAT for mounting the ESP from userspace if needed (firmware updates,
# bootloader inspection). Stock cix.config has it as =m.
CONFIG_VFAT_FS=y
CONFIG_NLS_CODEPAGE_437=y
CONFIG_NLS_ISO8859_1=y

# Defer fbcon's switch off efifb until userspace (a graphical session,
# or a `chvt` for plymouth) explicitly takes over. Without this flag,
# the moment the Cix DRM driver (Linlon-D60 / trilin_dpsub) loads, fbcon
# follows it onto a new framebuffer that nothing's actively rendering
# to — HDMI goes black. With deferred takeover, the EFI-allocated
# framebuffer keeps presenting tty1 until something actually claims
# the DRM modesetter. Boot 4 of MS-R1 confirmed this exact handoff
# (efifb up at 0.31s, drm display helper loaded at 10.46s, screen dark
# from there even though getty@tty1 is active).
CONFIG_FRAMEBUFFER_CONSOLE_DEFERRED_TAKEOVER=y
