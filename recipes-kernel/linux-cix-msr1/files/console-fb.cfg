#
# Force a working framebuffer console from kernel handoff onwards.
#
# cix.config ships none of efifb / simpledrm / DRM_FBDEV_EMULATION, so
# even though FRAMEBUFFER_CONSOLE_DEFERRED_TAKEOVER is on, there is no
# initial framebuffer to defer takeover FROM — fbcon never gets a
# canvas, the screen goes black the instant kernel takes over GOP from
# the bootloader, and stays black until userspace runs gdm + cix-dpu-
# driver. That breaks every diagnostic path: no kernel msgs visible,
# no getty visible, no d-i UI visible.
#
# We need at least one early framebuffer driver bound to the UEFI GOP
# region. Two cheap options exist; we ship both so the kernel picks
# whichever the platform lets it bind first:
#
#   - efifb: classic fbdev driver. Requires CONFIG_FB + CONFIG_FB_EFI.
#     Renders directly to GOP-allocated linear-RGB region exposed via
#     EFI Runtime Services memory map. Works on every aarch64 server +
#     SBC with sane firmware.
#
#   - simpledrm: modern DRM-based equivalent. Requires CONFIG_DRM +
#     CONFIG_DRM_SIMPLEDRM + CONFIG_DRM_FBDEV_EMULATION. Reads the
#     same GOP info but presents a DRM device, which fbcon then sits
#     on via fbdev emulation. Cleaner integration with later DRM
#     drivers (trilin_dpsub will hand off through DRM, not fbcon-on-fb).
#
# Plus the supporting bits: CONFIG_FB / CONFIG_DRM_FBDEV_EMULATION /
# CONFIG_FRAMEBUFFER_CONSOLE / CONFIG_VT and a font.

# fbdev base + EFI framebuffer
CONFIG_FB=y
CONFIG_FB_EFI=y

# DRM framebuffer-console emulation + simpledrm
CONFIG_DRM=y
CONFIG_DRM_FBDEV_EMULATION=y
CONFIG_DRM_FBDEV_OVERALLOC=100
CONFIG_DRM_SIMPLEDRM=y

# Make sure fbcon + VT exist and bind to whichever fbdev appears first
CONFIG_FRAMEBUFFER_CONSOLE=y
CONFIG_FRAMEBUFFER_CONSOLE_DETECT_PRIMARY=y
CONFIG_VT=y
CONFIG_VT_CONSOLE=y

# Bitmap font for tty rendering
CONFIG_FONTS=y
CONFIG_FONT_8x16=y
