# Yocto layer CI for meta-cix.
# Parse is required. yocto-check-layer is advisory until the BSP is hardened
# against real hardware and firmware constraints.

stages:
  - lint
  - parse
  - check-layer

variables:
  POKY_BRANCH: scarthgap
  GIT_DEPTH: "1"

lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --quiet yamllint
  script:
    - yamllint --no-warnings . || true
    - grep -q '^BBFILE_COLLECTIONS' conf/layer.conf
    - grep -q '^LAYERSERIES_COMPAT' conf/layer.conf
    - grep -q '^BBFILE_PRIORITY' conf/layer.conf
    - |
      find . -name "*.bb" -print0 | xargs -0 -I FF sh -c \
        'grep -qE "^(LICENSE|inherit|require)" "FF" || \
        (echo "MISSING LICENSE: FF" && exit 1)'

bitbake-parse:
  stage: parse
  image: ubuntu:24.04
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -qq
    - |
      apt-get install -y --no-install-recommends \
        git ca-certificates python3 python3-pexpect python3-git \
        python3-jinja2 python3-subunit gawk wget diffstat unzip texinfo \
        gcc build-essential chrpath socat cpio xz-utils debianutils \
        iputils-ping file locales zstd liblz4-tool sudo >/dev/null
    - locale-gen en_US.UTF-8 >/dev/null
    - useradd -m -s /bin/bash builder
    - mkdir -p /tmp/yocto-ci && cd /tmp/yocto-ci
    - chown -R builder:builder /tmp/yocto-ci "$CI_PROJECT_DIR"
    - |
      sudo -u builder -H env POKY_BRANCH="$POKY_BRANCH" bash -lc '
      set -eo pipefail
      cd /tmp/yocto-ci
      git clone --depth=1 --branch=$POKY_BRANCH \
        https://git.yoctoproject.org/poky 2>&1 | tail -2
      '
  script:
    - |
      sudo -u builder -H env CI_PROJECT_DIR="$CI_PROJECT_DIR" bash <<'EOS'
      set -eo pipefail
      export LANG=en_US.UTF-8
      export LC_ALL=en_US.UTF-8
      cd /tmp/yocto-ci/poky
      rm -rf build-cixpi
      source oe-init-build-env build-cixpi > /dev/null
      bitbake-layers add-layer "../meta-poky"
      bitbake-layers add-layer "$CI_PROJECT_DIR"
      cat >> conf/local.conf <<'EOF'
      MACHINE = "cixpi"
      DISTRO = "nclawzero"
      EOF
      bitbake -p
      EOS
  timeout: 45 minutes

check-layer:
  stage: check-layer
  when: manual
  tags:
    - yocto
  before_script:
    - mkdir -p /tmp/yocto-ci && cd /tmp/yocto-ci
    - |
      if [ ! -d poky ]; then
        git clone --depth=1 --branch=$POKY_BRANCH \
          https://git.yoctoproject.org/poky 2>&1 | tail -2
      else
        cd poky
        git fetch --depth=1 origin $POKY_BRANCH
        git reset --hard origin/$POKY_BRANCH
        cd ..
      fi
  script:
    - cd /tmp/yocto-ci/poky
    - rm -rf build-check-layer
    - source oe-init-build-env build-check-layer > /dev/null
    - bitbake-layers add-layer "../meta-poky"
    - bitbake-layers add-layer "$CI_PROJECT_DIR"
    - |
      yocto-check-layer "$CI_PROJECT_DIR" --no-auto-dependency || \
        echo "check-layer warnings present (advisory)"
  timeout: 45 minutes
  allow_failure: true
